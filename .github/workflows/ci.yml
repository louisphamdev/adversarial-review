name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: test (${{ matrix.os }}, node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: [20, 22]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      # Zero runtime deps, but `npm ci` works against the lockfile-less manifest
      # and validates the package can be installed cleanly.
      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Pack (dry run)
        run: npm run pack:dry-run
