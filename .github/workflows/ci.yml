name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: test (${{ matrix.os }}, node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: [20, 22]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      # Zero runtime deps, but `npm ci` REQUIRES a committed package-lock.json (it
      # errors out without one — which previously failed every CI run at this step,
      # before the test step ever ran). The lockfile is now checked in; `npm ci`
      # validates a clean, reproducible install against it.
      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Pack (dry run)
        run: npm run pack:dry-run
